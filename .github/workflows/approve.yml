name: Approve Showcase Site

on:
  issue_comment:
    types:
      - created

jobs:
  process-approval:
    runs-on: ubuntu-latest
    if: >
      github.event.comment.body == '/approve' &&
      contains(fromJson('["OWNER", "COLLABORATOR", "MEMBER"]'),
      github.event.comment.author_association)
    permissions:
      contents: write
      issues: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Parse Issue Form
        id: parse
        uses: zentered/issue-forms-body-parser@v2.2.0

      - name: Update showcased-sites.json with the new website
        shell: python
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          PARSED_DATA: ${{ steps.parse.outputs.data }}
          RAW_ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          import json
          import os
          import sys

          # Read the parsed data for text fields
          parsed_data_str = os.environ.get('PARSED_DATA', '{}')
          
          try:
              parsed_data = json.loads(parsed_data_str)
              if isinstance(parsed_data, str):
                  parsed_data = json.loads(parsed_data)
          except Exception as e:
              print(f"::error::Failed to parse JSON data from GitHub Action: {e}")
              sys.exit(1)

          # Helper for extracting text from the zentered JSON structure
          def get_text(key):
              field = parsed_data.get(key, {})
              if isinstance(field, dict):
                  text = field.get('text', '')
                  return '' if text == '_No response_' else text
              if isinstance(field, list):
                  return ';'.join(field)
              return '' if field == '_No response_' else str(field)

          issue_id = int(os.environ['ISSUE_NUMBER'])
          
          # Format URL (Auto-append https:// if missing ; remove HTML brackets if any)
          raw_site_url = get_text('live-url').strip().strip('<>')
          # work around GitHub automatically putting []() brackets around urls
          if '](' in raw_site_url:
              raw_site_url = raw_site_url.split('](', 1)[1].split(')', 1)[0].strip()
          clean_site_url = raw_site_url if raw_site_url.startswith(('http://', 'https://')) else f"https://{raw_site_url}"

          raw_body = os.environ.get('RAW_ISSUE_BODY', '')
          clean_image_url = ""
          
          if 'src="' in raw_body:
              src_value = raw_body.split('src="', 1)[1].split('"', 1)[0].strip()
              if '](' in src_value:
                  clean_image_url = src_value.split('](', 1)[1].split(')', 1)[0].strip()
              else:
                  clean_image_url = src_value

          # Format features
          features = get_text('core-features').replace(',', ';')
          custom_features = get_text('other-keywords').replace(',', ';')
          raw_features = f"{features};{custom_features}"
          clean_tags = [tag.strip() for tag in raw_features.split(';') if tag.strip() != 'None' and tag.strip()]

          site_name = get_text('project-name').strip()

          # Validation: check for empty critical fields
          if not site_name:
              print("::error::Validation Failed: Site name cannot be empty.")
              sys.exit(1)
          
          if not clean_site_url or clean_site_url == "https://":
              print("::error::Validation Failed: Invalid or missing Site URL.")
              sys.exit(1)

          if not clean_image_url:
              print("::error::Validation Failed: Invalid or missing Image URL.")
              sys.exit(1)

          # Build the new site dict
          new_site = {
              "issueNumber": issue_id,
              "name": site_name,
              "url": clean_site_url,
              "imageUrl": clean_image_url,
              "description": get_text('project-description').strip(),
              "tags": clean_tags
          }

          file_path = 'resources/showcase/showcased-sites.json'

          # Read current JSON array, append the new site, save
          with open(file_path, 'r') as file:
              sites = json.load(file)

          sites.append(new_site)

          with open(file_path, 'w') as file:
              json.dump(sites, file, indent=2)

      - name: Commit Changes
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add resources/showcase/showcased-sites.json
          git commit -m "Approve showcase submission #${ISSUE_NUMBER}"
          git push

      - name: Close Issue and Comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue close ${{ github.event.issue.number }} --comment "✅ The site has been approved and added to the showcase."
