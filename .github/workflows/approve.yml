name: Approve Showcase Site

on:
  issue_comment:
    types:
      - created

jobs:
  process-approval:
    runs-on: ubuntu-latest
    if: >
      github.event.comment.body == '/approve' &&
      contains(fromJson('["OWNER", "COLLABORATOR", "MEMBER"]'),
      github.event.comment.author_association)
    permissions:
      contents: write
      issues: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Parse Issue Form
        id: parse
        uses: zentered/issue-forms-body-parser@v2.0.0

      - name: Update showcased-sites.json with the new website
        shell: python
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          SITE_NAME: ${{ steps.parse.outputs.data.site_name }}
          SITE_URL: ${{ steps.parse.outputs.data.site_url }}
          IMAGE_URL: ${{ steps.parse.outputs.data.image_url }}
          DESCRIPTION: ${{ steps.parse.outputs.data.description }}
          FEATURES: ${{ steps.parse.outputs.data.features }}
          CUSTOM_FEATURES: ${{ steps.parse.outputs.data.custom_features }}
        run: |
          import json
          import os


          issue_id = int(os.environ['ISSUE_NUMBER'])
          dropdown_features = os.environ.get('FEATURES', '')
          custom_features = os.environ.get('CUSTOM_FEATURES', '')

          # GitHub's dropdown outputs commas by default. Convert those to semicolons.
          dropdown_features = dropdown_features.replace(',', ';')

          # Combine both strings using a semicolon
          raw_features = f"{dropdown_features};{custom_features}"

          # Split by semicolon, clean up whitespace
          clean_tags = [tag.strip() for tag in raw_features.split(';') if tag.strip() != 'None' and tag.strip()]

          new_site = {
              "issueNumber": issue_id,
              "name": os.environ['SITE_NAME'],
              "url": os.environ['SITE_URL'],
              "imageUrl": os.environ['IMAGE_URL'],
              "description": os.environ.get('DESCRIPTION', ''),
              "tags": clean_tags
          }

          file_path = 'resources/showcase/showcased-sites.json'

          # Read current JSON array
          with open(file_path, 'r') as file:
              sites = json.load(file)

          # Add the new site to the array
          sites.append(new_site)

          # Save the updated array back to the file
          with open(file_path, 'w') as file:
              json.dump(sites, file, indent=2)

      - name: Commit Changes
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add resources/showcase/showcased-sites.json
          git commit -m "Approve showcase submission #${ISSUE_NUMBER}"
          git push

      - name: Close Issue and Comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue close ${{ github.event.issue.number }} --comment "✅ The site has been approved and added to the showcase."