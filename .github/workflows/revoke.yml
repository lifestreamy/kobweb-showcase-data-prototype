name: Revoke Showcase Site

on:
  issue_comment:
    types:
      - created

jobs:
  process-revocation:
    runs-on: ubuntu-latest
    if: >
      github.event.comment.body == '/revoke' &&
      contains(fromJson('["OWNER", "COLLABORATOR", "MEMBER"]'), 
      github.event.comment.author_association)
    permissions:
      contents: write
      issues: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Remove website from showcased-sites.json
        shell: python
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          import json
          import os

          # Get the issue number to revoke
          issue_id = int(os.environ['ISSUE_NUMBER'])
          file_path = 'resources/showcase/showcased-sites.json'

          # Read the current array
          with open(file_path, 'r') as file:
              sites = json.load(file)

          # Keep only the sites that don't match this issue ID
          updated_sites = [site for site in sites if site.get('issueNumber') != issue_id]

          # Save the filtered array back to the file
          with open(file_path, 'w') as file:
              json.dump(updated_sites, file, indent=2)

      - name: Commit Changes
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add resources/showcase/showcased-sites.json
          git commit -m "Revoke showcase submission #${ISSUE_NUMBER}"
          git push

      - name: Leave Revocation Comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment ${{ github.event.issue.number }} --body "🗑️ The submission has been revoked and the site was removed from the showcase."
