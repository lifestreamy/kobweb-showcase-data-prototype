name: Revoke Showcase Site

on:
  issue_comment:
    types:
      - created

jobs:
  process-revocation:
    runs-on: ubuntu-latest
    if: >
      github.event.comment.body == '/revoke' &&
      contains(fromJson('["OWNER", "COLLABORATOR", "MEMBER"]'),
      github.event.comment.author_association)
    permissions:
      contents: write
      issues: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Remove site from showcased-sites.json
        id: update_json
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: python .github/scripts/revoke_showcase.py

      - name: Commit Changes
        if: steps.update_json.outputs.action_result == 'revoked'
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add resources/showcase/showcased-sites.json
          git commit -m "Revoke showcase submission #${ISSUE_NUMBER}"
          git push

      - name: Comment on Issue without closing
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ACTION_RESULT: ${{ steps.update_json.outputs.action_result }}
        run: |
          if [ "$ACTION_RESULT" = "not_found" ]; then
            gh issue comment ${{ github.event.issue.number }} --body "✅ There is no submission to revoke for this issue."
          else
            gh issue comment ${{ github.event.issue.number }} --body "✅ The site has been successfully revoked and removed from the showcase."
          fi